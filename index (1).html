    // Data Governance (11%) — DMBOK2 Chapter 3 grounded
    { id: 1, topic: "gov", question: "According to DAMA-DMBOK2, Data Governance is BEST defined as:", options: ["The technical management of databases and servers", "The exercise of authority and control over the management of data assets", "The process of building data warehouses", "A project to improve data quality scores", "The IT department's responsibility for data backups"], correct: 1, explanation: "DMBOK2 defines Data Governance as 'the exercise of authority and control (planning, implementation, monitoring, and enforcement) over the management of data assets.' It is about oversight, not execution." },
    { id: 2, topic: "gov", question: "What is the KEY distinction between Data Governance and Data Management per the DMBOK2?", options: ["They are the same function with different names", "DG is technical; DM is business-focused", "DG provides oversight; DM executes operations", "DG only applies to sensitive data; DM applies to all data", "DG replaces DM in modern organizations"], correct: 2, explanation: "The DMBOK2 emphasizes an inherent separation of duty: Data Governance ensures data is properly managed (oversight), while Data Management actually manages data to achieve goals (execution). Like an auditor vs. an accountant." },
    { id: 3, topic: "gov", question: "Which body is the HIGHEST authority in the Data Governance organization, responsible for oversight, support, and funding?", options: ["Data Governance Office (DGO)", "Data Stewardship Teams", "Data Governance Council (DGC)", "Data Governance Steering Committee", "Chief Data Officer alone"], correct: 3, explanation: "The Data Governance Steering Committee is the primary and highest authority, consisting of a cross-functional group of senior executives responsible for oversight, support, and funding of DG activities." },
    { id: 4, topic: "gov", question: "In a FEDERATED Data Governance operating model, which statement is TRUE?", options: ["One DG org oversees all activities in all subject areas", "The same DG model is independently adopted by each business unit", "One DG org coordinates with multiple BUs for consistent definitions and standards", "Each department creates governance policies without coordination", "No formal governance structure exists"], correct: 2, explanation: "In a federated model, one Data Governance organization coordinates with multiple Business Units to maintain consistent definitions and standards. Centralized = one org oversees all. Replicated = same model independently adopted." },
    { id: 36, topic: "gov", question: "A Business Data Steward is BEST described as:", options: ["An IT professional managing database infrastructure", "A business professional / SME accountable for a subset of data who works with stakeholders to define and control data", "An external consultant hired for governance projects", "A software developer writing data access code", "A project manager overseeing IT implementations"], correct: 1, explanation: "Business Data Stewards are business professionals, most often recognized subject matter experts, accountable for a subset of data. They work with stakeholders to define and control data. This is distinct from Technical Data Stewards who are IT professionals." },
    { id: 37, topic: "gov", question: "The DMBOK2 maps Data Governance to political governance. Which mapping is CORRECT?", options: ["Legislative = Issue management; Judicial = Defining policies", "Legislative = Defining policies, standards, and Enterprise Data Architecture; Judicial = Issue management and escalation; Executive = Administrative duties", "Legislative = Database management; Judicial = Security auditing", "All three branches perform the same functions", "The political analogy only applies to government organizations"], correct: 1, explanation: "The DMBOK2 explicitly maps DG functions: Legislative (policies, standards, Enterprise Data Architecture), Judicial (issue management and escalation), and Executive (protecting and serving, administrative responsibilities)." },
    { id: 38, topic: "gov", question: "According to the DMBOK2, what is the MOST common driver for establishing a Data Governance function?", options: ["Reducing IT infrastructure costs", "Implementing new database technologies", "Regulatory compliance", "Hiring more data scientists", "Building a data warehouse"], correct: 2, explanation: "The DMBOK2 states the most common driver for Data Governance is regulatory compliance, especially for heavily regulated industries such as financial services and healthcare." },
    { id: 39, topic: "gov", question: "What is a Data Owner according to the DMBOK2?", options: ["The IT administrator who manages the database", "A business person accountable for decisions about data within their domain", "The DBA responsible for backup and recovery", "The vendor who provides data to the organization", "The software developer who creates data entry forms"], correct: 1, explanation: "A Data Owner is a business person who is accountable for decisions about data within their domain. This is a BUSINESS role, not a technical one." },
    { id: 40, topic: "gov", question: "A Business Glossary differs from a Data Dictionary in that a Business Glossary:", options: ["Contains database table structures and column definitions", "Provides shared business terms and definitions managed by data stewards", "Is only used by IT staff", "Documents ETL transformation rules", "Lists server hardware specifications"], correct: 1, explanation: "A Business Glossary is a collection of business terms and definitions providing shared organizational vocabulary, managed by Data Stewards. A Data Dictionary defines technical data structures (tables, columns, data types)." },
    { id: 41, topic: "gov", question: "The DMBOK2 states Data Governance should be 'sustainable.' This means:", options: ["It uses environmentally friendly technology", "It is a project with a defined start and end date", "It is NOT a project with a defined end; it is an ongoing continuous function", "It should be funded only during the first year", "It only operates during regulatory audits"], correct: 2, explanation: "The DMBOK2 states that the DG function needs to be 'sticky' — Data Governance is not a project with a defined end; it is an ongoing program focused on ensuring an organization gets value from its data." },
    { id: 42, topic: "gov", question: "Which DG principle states that Data Governance occurs at both the enterprise and local levels?", options: ["Shared responsibility", "Multi-layered", "Framework-based", "Principle-based", "Business-driven"], correct: 1, explanation: "The Multi-layered principle states that Data Governance occurs at both the enterprise and local levels and often at levels in between." },
    { id: 43, topic: "gov", question: "What is the relationship between Data Governance and IT Governance per the DMBOK2?", options: ["They are the same function", "IT Governance is a subset of Data Governance", "Data Governance is a subset of IT Governance", "They are separate functions; IT Governance focuses on IT investments while DG focuses on data assets", "Data Governance replaces IT Governance"], correct: 3, explanation: "The DMBOK2 states they are separate: IT Governance makes decisions about IT investments, application portfolio, and technical architecture. Data Governance focuses exclusively on managing data assets." },
    // Data Quality (11%)
    { id: 5, topic: "qual", question: "Which of these is NOT a commonly recognized dimension of Data Quality?", options: ["Accuracy", "Completeness", "Profitability", "Timeliness", "Consistency"], correct: 2, explanation: "Profitability is a business metric, not a data quality dimension. Core DQ dimensions include accuracy, completeness, consistency, timeliness, validity, and uniqueness." },
    { id: 6, topic: "qual", question: "What is the purpose of Data Profiling?", options: ["Encrypting sensitive data", "Analyzing data to understand its structure, content, and quality", "Creating backup copies of databases", "Designing data models", "Migrating data to the cloud"], correct: 1, explanation: "Data Profiling is the process of examining data to collect statistics and information about its structure, content, quality, and relationships." },
    { id: 7, topic: "qual", question: "A Data Quality rule that checks if all customer records have a valid email format is an example of:", options: ["Referential integrity", "Validity checking", "Completeness analysis", "Timeliness monitoring", "Uniqueness verification"], correct: 1, explanation: "Validity checking ensures data conforms to defined formats, ranges, or business rules — such as verifying email addresses follow the expected pattern." },
    { id: 8, topic: "qual", question: "The 'root cause analysis' technique in Data Quality Management is used to:", options: ["Find the fastest query execution path", "Identify the underlying reasons for data quality issues", "Determine data storage requirements", "Plan database backups", "Design ETL workflows"], correct: 1, explanation: "Root cause analysis aims to identify the fundamental reasons why data quality issues occur, enabling organizations to fix problems at their source rather than just treating symptoms." },
    // Data Modeling & Design (11%)
    { id: 9, topic: "model", question: "Which data model type represents data in terms of business concepts, independent of technology?", options: ["Physical data model", "Logical data model", "Conceptual data model", "Dimensional model", "Relational model"], correct: 2, explanation: "A Conceptual Data Model represents high-level business concepts and relationships, independent of any technology or implementation details." },
    { id: 10, topic: "model", question: "In Entity-Relationship modeling, a many-to-many relationship between two entities typically requires:", options: ["A foreign key in one table", "An associative (junction) entity", "Denormalization", "A stored procedure", "A trigger"], correct: 1, explanation: "Many-to-many relationships are resolved by creating an associative (junction/bridge) entity that holds the foreign keys of both related entities." },
    { id: 11, topic: "model", question: "Third Normal Form (3NF) eliminates:", options: ["All data redundancy", "Transitive dependencies", "Multi-valued dependencies", "Join dependencies", "All null values"], correct: 1, explanation: "Third Normal Form (3NF) removes transitive dependencies — where a non-key attribute depends on another non-key attribute rather than directly on the primary key." },
    { id: 12, topic: "model", question: "A star schema in dimensional modeling consists of:", options: ["Only fact tables", "Only dimension tables", "A central fact table surrounded by dimension tables", "Normalized lookup tables", "Hierarchical parent-child tables"], correct: 2, explanation: "A star schema features a central fact table (containing measurable data) surrounded by denormalized dimension tables that provide descriptive context." },
    // Metadata Management (11%)
    { id: 13, topic: "meta", question: "Which type of metadata describes the structure and format of data (e.g., column names, data types)?", options: ["Business metadata", "Technical metadata", "Operational metadata", "Process metadata", "Administrative metadata"], correct: 1, explanation: "Technical metadata describes the structure and format of data assets, including table definitions, column names, data types, and relationships." },
    { id: 14, topic: "meta", question: "A data catalog primarily serves which purpose?", options: ["Real-time data processing", "Enabling users to discover, understand, and trust available data assets", "Encrypting data at rest", "Automating ETL processes", "Managing database indexes"], correct: 1, explanation: "A data catalog is an inventory that enables data consumers to discover, understand, and trust the data assets available across the organization." },
    { id: 15, topic: "meta", question: "Data lineage is BEST described as:", options: ["The physical location of data storage", "The history and lifecycle of data as it moves through systems", "The access control list for data assets", "The schema version history", "The backup schedule for databases"], correct: 1, explanation: "Data lineage tracks the origin, movement, transformation, and destination of data throughout its lifecycle across various systems and processes." },
    // Master & Reference Data (10%)
    { id: 16, topic: "mref", question: "Master Data Management (MDM) primarily aims to:", options: ["Increase database query speed", "Create a single, authoritative source of key business entities", "Automate report generation", "Reduce data storage costs", "Manage unstructured documents"], correct: 1, explanation: "MDM focuses on creating and maintaining a single, consistent, authoritative source of truth for key business entities like customers, products, and locations." },
    { id: 17, topic: "mref", question: "Reference data is BEST defined as:", options: ["Data used exclusively for testing", "Data used to classify or categorize other data", "Encrypted backup data", "Transactional log data", "Archived historical data"], correct: 1, explanation: "Reference data consists of codes, lookup values, and classifications used to categorize and relate other data — examples include country codes, currency codes, and status values." },
    { id: 18, topic: "mref", question: "A 'golden record' in MDM refers to:", options: ["The first record created in a database", "The single best version of an entity created by merging data from multiple sources", "A record protected by encryption", "A record flagged for deletion", "The most recently updated record"], correct: 1, explanation: "A golden record is the single, most accurate, and complete version of a master data entity, created by reconciling and merging data from multiple source systems." },
    // Data Warehousing & BI (10%)
    { id: 19, topic: "dwbi", question: "The ETL process stands for:", options: ["Evaluate, Test, Launch", "Extract, Transform, Load", "Enable, Track, Log", "Encrypt, Transfer, Link", "Edit, Transfer, Load"], correct: 1, explanation: "ETL (Extract, Transform, Load) is the process of extracting data from source systems, transforming it to fit operational and analytical needs, and loading it into a target data warehouse." },
    { id: 20, topic: "dwbi", question: "A slowly changing dimension (SCD) Type 2 handles changes by:", options: ["Overwriting the old value", "Adding a new row with effective dates to preserve history", "Ignoring all changes", "Creating a separate change log table", "Flagging records for manual review"], correct: 1, explanation: "SCD Type 2 preserves historical data by creating a new row each time a dimension attribute changes, using effective date ranges or version flags to track history." },
    { id: 21, topic: "dwbi", question: "An OLAP cube enables:", options: ["Real-time transaction processing", "Multidimensional analysis of data across different perspectives", "Automated backup and recovery", "Source code version control", "Network security monitoring"], correct: 1, explanation: "OLAP (Online Analytical Processing) cubes allow users to analyze data across multiple dimensions (e.g., time, geography, product) for complex business intelligence queries." },
    // Data Architecture (6%)
    { id: 22, topic: "arch", question: "Enterprise Data Architecture PRIMARILY provides:", options: ["Detailed database tuning parameters", "A blueprint for managing data assets aligned with business strategy", "Firewall configurations", "Application source code standards", "Server hardware specifications"], correct: 1, explanation: "Enterprise Data Architecture provides a master blueprint that defines how data assets are structured, integrated, and managed in alignment with the organization's business strategy." },
    { id: 23, topic: "arch", question: "A data lake differs from a data warehouse primarily because:", options: ["It only stores structured data", "It stores raw data in its native format without predefined schema", "It is always on-premise", "It cannot support analytics", "It requires more rigid governance"], correct: 1, explanation: "A data lake stores raw data in its native format (structured, semi-structured, unstructured) using a schema-on-read approach, unlike a data warehouse which requires predefined schemas." },
    // Data Integration (6%)
    { id: 24, topic: "intg", question: "Data virtualization differs from physical data integration because it:", options: ["Requires all data to be moved to a central repository", "Provides a unified view of data without physically moving it", "Only works with relational databases", "Is slower than batch processing", "Requires manual data entry"], correct: 1, explanation: "Data virtualization creates a logical, unified view across multiple data sources without physically moving or replicating the data, providing real-time access to distributed data." },
    { id: 25, topic: "intg", question: "An API-based integration approach is BEST suited for:", options: ["Batch processing of historical data", "Real-time or near-real-time data exchange between systems", "Archiving old records", "Manual data correction", "Creating physical backups"], correct: 1, explanation: "API-based integration enables real-time or near-real-time data exchange between systems through well-defined interfaces, supporting modern application integration patterns." },
    // Data Security (6%)
    { id: 26, topic: "sec", question: "Data masking is a technique used to:", options: ["Speed up query processing", "Replace sensitive data with realistic but fake values", "Compress data for storage", "Index data for search", "Encrypt network traffic"], correct: 1, explanation: "Data masking replaces sensitive data with realistic but fictitious values, allowing data to be used for testing, development, or analytics without exposing actual sensitive information." },
    { id: 27, topic: "sec", question: "The principle of 'least privilege' in data security means:", options: ["Everyone gets full admin access", "Users are given only the minimum access necessary to perform their role", "Data is encrypted with the weakest algorithm", "Security audits are done as rarely as possible", "All data is made publicly available"], correct: 1, explanation: "The principle of least privilege ensures users and systems are granted only the minimum level of access needed to perform their functions, reducing risk of unauthorized data exposure." },
    // Data Storage & Operations (6%)
    { id: 28, topic: "stor", question: "Database normalization primarily aims to:", options: ["Increase query speed", "Reduce data redundancy and improve data integrity", "Maximize storage utilization", "Simplify user interfaces", "Automate data entry"], correct: 1, explanation: "Normalization organizes data to reduce redundancy and dependency, improving data integrity by ensuring each fact is stored in only one place." },
    { id: 29, topic: "stor", question: "A database transaction must satisfy ACID properties. The 'I' stands for:", options: ["Integration", "Isolation", "Indexing", "Implementation", "Identification"], correct: 1, explanation: "ACID stands for Atomicity, Consistency, Isolation, Durability. Isolation ensures that concurrent transactions do not interfere with each other." },
    // Document & Content Management (6%)
    { id: 30, topic: "doc", question: "A records retention schedule defines:", options: ["How often to back up databases", "How long different types of records must be kept and when they can be destroyed", "The order in which documents are created", "Who can view documents", "The format of document templates"], correct: 1, explanation: "A records retention schedule specifies how long each category of records must be maintained for legal, regulatory, or business purposes, and when they can be disposed of." },
    { id: 31, topic: "doc", question: "Content Management differs from Records Management primarily in that content management focuses on:", options: ["Long-term archival storage", "The creation, management, and delivery of digital content through its lifecycle", "Legal compliance only", "Paper document storage", "Database administration"], correct: 1, explanation: "Content Management focuses on creating, managing, storing, and delivering digital content throughout its lifecycle, while Records Management specifically addresses retention, compliance, and legal requirements." },

    { id: 32, topic: "proc", question: "According to DAMA-DMBOK, Data Management is defined as:", options: ["Only the technical storage of data", "The development, execution, and supervision of plans and programs that control, protect, deliver, and enhance the value of data", "Exclusively database administration", "Software development methodology", "Project management for IT"], correct: 1, explanation: "DAMA defines Data Management broadly as the development, execution, and supervision of plans, programs, practices, and procedures that deliver, control, protect, and enhance the value of data and information assets." },

    { id: 35, topic: "big", question: "MapReduce is a programming model primarily used for:", options: ["Creating user interfaces", "Processing and generating large datasets across distributed clusters", "Managing database transactions", "Designing data models", "Encrypting network traffic"], correct: 1, explanation: "MapReduce is a programming model for processing large datasets in parallel across distributed computing clusters, breaking work into 'map' and 'reduce' operations." },
